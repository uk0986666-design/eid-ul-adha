    <title>Eid-card-page</title>
    <style>
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #000000, #434343);
        font-family: Arial, Helvetica, sans-serif;
    } 
    
    .greeting-card{
        background-color: rgba(255,255,255,0.1);
        padding: 40px;
        width: 500px;
        text-align: center;
        border-radius: 25px;
        box-shadow: 0px 0px 10px gray;
    }

    h1{
        color: white;
        font-size: 60px;
        letter-spacing: 3px;
        animation: glow 2s infinite alternate;
    }

    p{
        color: #d3d3d3;
        font-size: 20px;
    }

    @keyframes glow{

    from{
        text-shadow: 0px 0px 10px white;
    }

    to{
        text-shadow: 0px 0px 25px gray;
    }

}
.greeting-card:hover{
    transform: scale(1.03);
    transition: 0.3s;
}

@media(max-width:600px){

    .greeting-card{
        width: 90%;
        padding: 20px;
    }

    h1{
        font-size: 40px;
    }

}

.greeting-card img{
    width: 400px;
    margin-bottom: 20px;
    border-radius: 25px;

}
.greeting-card img{
    animation: float 3s infinite ease-in-out;
}
@keyframes float{

    0%{
        transform: translateY(0px);
    }

    50%{
        transform: translateY(-10px);
    }

    100%{
        transform: translateY(0px);
    }

}

.back-btn{
    display: block;
    margin-top: 20px;
    padding: 10px 20px;
    background-color: gray;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 20px
}

.back-btn:hover{
    background-color: #555;
    transition: 0.3s;
}
