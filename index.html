<!DOCTYPE html>
<html>
<head>
  <title>Navbar</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    nav{
      background-color: #1e293b;
      padding: 15px;
    }

    ul{
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    ul li a{
      text-decoration: none;
      color: white;
      font-size: 18px;
      font-family: Arial, sans-serif;
      padding: 8px 15px;
      border-radius: 6px;
      transition: 0.3s;
    }

    ul li a:hover{
      background-color: #38bdf8;
      color: black;
    }
  </style>
</head>

<body>

  <nav>
    <ul>
      <li><a href="">Home</a></li>
      <li><a href="">About</a></li>
      <li><a href="">Services</a></li>
      <li><a href="">Contact</a></li>
    </ul>
  </nav>

</body>
</html>
